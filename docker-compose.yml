version: '3.9'

# Infrastructure layer — Jenkins + Nginx proxy.
# App containers (blue/green) are managed by deploy.sh, not here.

services:

  jenkins:
    build:
      context: ./jenkins
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      # Docker socket: lets Jenkins run docker commands on the host daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount repo so Jenkins can clone from file:///repo
      - .:/repo:ro
      # Copy JCasC config into Jenkins home on startup
      - ./jenkins/casc:/var/jenkins_home/casc:ro
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc
    networks:
      - ci-cd-network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # conf.d is NOT read-only — deploy.sh rewrites upstream.conf and reloads
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - ci-cd-network
    restart: unless-stopped

networks:
  ci-cd-network:
    name: ci-cd-network
    driver: bridge

volumes:
  jenkins_home:
    name: ci-cd-jenkins-home

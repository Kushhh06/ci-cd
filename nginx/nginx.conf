events {
  worker_connections 1024;
}

http {
  # Docker's internal DNS — resolves container names at request time, not at startup.
  # This lets nginx start even before app containers exist.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  server {
    listen 80;

    # Defaults — overwritten by upstream.conf on every deploy
    set $backend_upstream  "ai-notes-backend-blue:3000";
    set $frontend_upstream "ai-notes-frontend-blue:80";

    include /etc/nginx/conf.d/upstream.conf;

    location /api/ {
      proxy_pass         http://$backend_upstream/api/;
      proxy_http_version 1.1;
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_connect_timeout 5s;
      proxy_read_timeout    30s;
    }

    location / {
      proxy_pass         http://$frontend_upstream/;
      proxy_http_version 1.1;
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
    }

    location /nginx-health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }
  }
}
